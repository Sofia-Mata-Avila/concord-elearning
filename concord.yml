configuration:
  runtime: "concord-v2"
  arguments:
    myName: Sofia #Put your name here
  debug: true

triggers:
  - github:
      version: 2
      entryPoint: default
      conditions:
        type: "push"

flows:
  default:
    - log: "Today's breakfast options include:"
    - call: breakfast
      loop:
        items:
          - Eggs
          - Orange Juice
          - Toast and marmalade

  breakfast:          
    - log: ${item}

    
